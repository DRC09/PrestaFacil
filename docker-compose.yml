version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: prestamos_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prestamos_net

  backend:
    build: ./backend
    container_name: prestamos_backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - prestamos_net

  frontend:
    build: ./frontend
    container_name: prestamos_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - prestamos_net

volumes:
  mysql_data:

networks:
  prestamos_net:
    driver: bridge
